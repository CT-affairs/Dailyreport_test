<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳票_一覧</title>
    <!--
      Frontend mapping note (safe/public):
      - URL base is /liff/
      - /liff/invoice.html maps to this file (project root invoice.html)
      - /liff/js/invoice.js maps to project root js/invoice.js
      - Do not create a physical liff/ directory for this mapping
    -->
    <link rel="stylesheet" href="css/admin.css">
</head>
<body style="background:#f5f7fa; margin:0;">
    <div style="max-width: 1400px; margin: 0 auto; padding: 16px;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <h1 style="margin:0; font-size:1.3rem;">帳票_一覧</h1>
            <a href="/liff/admin.html" style="margin-left:auto;">管理画面へ戻る</a>
        </div>
        <div style="padding: 10px; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            <button type="button" id="invoice-ocr-refresh-btn" class="btn-secondary">再読込</button>
            <button type="button" id="invoice-ocr-save-btn" class="btn-secondary" style="background-color:#083969; color:#fff;">更新</button>
            <div id="invoice-ocr-status" style="font-size: 0.9em; color: #666;"></div>
        </div>
        <div id="invoice-ocr-content" style="padding: 10px;">
            <div style="text-align:center; padding: 2em; color:#666;">読み込み中...</div>
        </div>
    </div>
    <script src="js/invoice.js?v=1.0.0"></script>
</body>
</html>
