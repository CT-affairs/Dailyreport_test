<style>
    /* この画面専用のスタイル調整 */
    /* コンテナIDが変更されたためセレクタを修正 */
    #net-category-layout-container .data-table {
        font-size: 0.8em; /* フォントを小さく */
    }
    #net-category-layout-container .data-table th,
    #net-category-layout-container .data-table td {
        padding: 3px 5px; /* 行間を詰める */
        line-height: 1.2; /* 行の高さを最小限に */
    }
</style>
<!-- 全体を囲むコンテナを追加し、幅を制限 -->
<div style="max-width: 900px;">
    <!-- 表示切替トグル -->
    <div style="margin-bottom: 10px; display: flex; align-items: center;">
        <label for="net-category-toggle-checked" style="cursor: pointer; user-select: none; font-size: 0.9em;">
            <input type="checkbox" id="net-category-toggle-checked" style="margin-right: 5px; vertical-align: middle;">
            チェックありで表示を絞る
        </label>
    </div>
    <!-- 左右のテーブルを配置するためのFlexコンテナ -->
    <div id="net-category-layout-container" style="display: flex; gap: 20px; align-items: flex-start;">
    
        <!-- 左側のテーブル -->
        <div id="net-category-table-container-left" style="flex: 1;">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                                <th style="width: 20%;">集計項目</th>
                                <th style="width: 50%;">業務種別</th>
                                <th style="width: 10%;">選択</th>
                                <th style="width: 20%;">カラーコード</th>
                        </tr>
                    </thead>
                    <tbody id="net-category-table-body-left">
                        <tr><td colspan="4" style="text-align:center; padding: 2em;">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    
        <!-- 右側のテーブル -->
        <div id="net-category-table-container-right" style="flex: 1;">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">集計項目</th>
                            <th style="width: 50%;">業務種別</th>
                            <th style="width: 10%;">選択</th>
                            <th style="width: 20%;">カラーコード</th>
                        </tr>
                    </thead>
                    <tbody id="net-category-table-body-right">
                        <tr><td colspan="4" style="text-align:center; padding: 2em;">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
