<style>
    /* この画面専用のスタイル調整 */
    /* コンテナIDが変更されたためセレクタを修正 */
    #net-category-layout-container .data-table {
        font-size: 0.8em; /* フォントを小さく */
        width: auto; /* テーブル幅を自動調整 */
    }
    #net-category-layout-container .data-table th,
    #net-category-layout-container .data-table td {
        padding: 3px 5px; /* 行間を詰める */
        line-height: 1.2; /* 行の高さを最小限に */
        text-align: left; /* 左寄せに統一 */
    }
    /* チェックボックス列のみ中央寄せ */
    #net-category-layout-container .data-table th:nth-child(3), /* ヘッダーはrowspanの影響を受けないため3番目でOK */
    #net-category-layout-container .data-table td.cell-center { /* データセルはrowspanの影響を受けるためクラスで指定 */
        text-align: center;
    }
</style>
<!-- 全体を囲むコンテナで幅を制限 -->
<div style="max-width: 800px;">
    <!-- 表示切替トグル -->
    <div style="margin-bottom: 10px; display: flex; align-items: center;">
        <label for="net-category-toggle-checked" style="cursor: pointer; user-select: none; font-size: 0.9em;">
            <input type="checkbox" id="net-category-toggle-checked" style="margin-right: 5px; vertical-align: middle;">
            ✓で表示を絞る
        </label>
    </div>
    <!-- 左右のテーブルを配置するためのFlexコンテナ -->
    <div id="net-category-layout-container" style="display: flex; gap: 10px; align-items: flex-start;">
    
        <!-- 左側のテーブル -->
        <div id="net-category-table-container-left">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="min-width: 20px;">集計項目</th>
                            <th style="min-width: 40px;">業務種別</th>
                            <th style="width: 10px;">✓</th>
                            <th style="min-width: 20px;">Color</th>
                        </tr>
                    </thead>
                    <tbody id="net-category-table-body-left">
                        <tr><td colspan="4" style="text-align:center; padding: 2em;">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    
        <!-- 右側のテーブル -->
        <div id="net-category-table-container-right">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="min-width: 20px;">集計項目</th>
                            <th style="min-width: 40px;">業務種別</th>
                            <th style="width: 10px;">✓</th>
                            <th style="min-width: 20px;">Color</th>
                        </tr>
                    </thead>
                    <tbody id="net-category-table-body-right">
                        <tr><td colspan="4" style="text-align:center; padding: 2em;">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
