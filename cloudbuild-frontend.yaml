steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    # Cloud Build では COMMIT_SHA が入る。入らない場合は HEAD を使用。
    commit="$COMMIT_SHA"
    [ -n "$commit" ] || commit=HEAD

    # 変更ファイル一覧の取得（マージコミット等でも安定させる）
    if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
      # shallow clone 対策: 対象コミットの親が無い場合があるため、コミット周辺を明示的に取得する
      # COMMIT_SHA が存在する場合、origin から depth=2 で取得すると parent も取り込める
      if [ "$commit" != "HEAD" ]; then
        git fetch --no-tags --depth=2 origin "$commit" >/dev/null 2>&1 || true
      fi

      if git cat-file -e "$commit^{commit}" >/dev/null 2>&1; then
        # 親（1st parent）を取得。マージコミットの場合もまずは1st parentを使う
        parent="$(git rev-list --parents -n 1 "$commit" | awk '{print $2}')"
        if [ -n "$parent" ] && git cat-file -e "$parent^{commit}" >/dev/null 2>&1; then
          git diff --name-only "$parent" "$commit" > changed.txt
        else
          echo "ERROR: Unable to resolve parent for commit: $commit" >&2
          echo "The checkout is likely too shallow. Ensure the trigger fetches enough history, or allow git fetch in build." >&2
          exit 1
        fi
      else
        echo "WARN: commit not found in repo: $commit" >&2
        git ls-files > changed.txt
      fi
    else
      echo "WARN: .git not available; falling back to all files" >&2
      # gitが使えない場合は「全ファイル」扱いにする（ただし下のホワイトリストで絞る）
      find . -type f | sed 's|^\./||' > changed.txt
    fi

    # 表示（空だと原因調査が難しいため）
    if [ ! -s changed.txt ]; then
      echo "(no changed files detected)"
    else
      cat changed.txt
    fi

    echo ""
    echo "Deploy whitelist (deploy_frontend.txt):"
    if [ ! -f deploy_frontend.txt ]; then
      echo "ERROR: deploy_frontend.txt not found." >&2
      exit 1
    fi

    # 空行とコメント行を除外し、CRLFも吸収して正規化
    tr -d '\r' < deploy_frontend.txt | grep -vE '^\s*($|#)' > deploy_frontend.normalized.txt
    cat deploy_frontend.normalized.txt

    matches_whitelist () {
      file="$1"
      while IFS= read -r pattern
      do
        [ -n "$pattern" ] || continue
        case "$file" in
          $pattern) return 0 ;;
        esac
      done < deploy_frontend.normalized.txt
      return 1
    }

    while IFS= read -r file
    do
      [ -f "$file" ] || continue

      # deploy_frontend.txt に含まれるものだけデプロイ対象
      matches_whitelist "$file" || continue

      dir=$(dirname "$file")

      echo "upload: $file"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no;
        mkdir -p $dir;
        put $file -o $file;
        bye
      "

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY