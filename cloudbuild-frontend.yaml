steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    git show --name-only --pretty="" HEAD > changed.txt
    cat changed.txt

    while read file
    do
      [ -f "$file" ] || continue

      echo "$file" | grep -q '\.py$' && continue
      echo "$file" | grep -q '^.git' && continue

      dir=$(dirname "$file")

      echo "upload: $file"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no;
        mkdir -p liff/$dir;
        put $file -o liff/$file;
        bye
      "

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY