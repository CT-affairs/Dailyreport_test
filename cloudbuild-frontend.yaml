# FTP フロント配信（ホスティングへ lftp put）
# トリガーまたは手動実行時に _FTP_* を上書きすること（REPLACE_ME のままでは失敗する）
substitutions:
  _FTP_HOST: "REPLACE_ME"
  _FTP_USER: "REPLACE_ME"
  _FTP_PASS: "REPLACE_ME"
# 作成手順: scripts/setup-frontend-deploy-trigger.ps1（beta import）を参照
steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    commit="$COMMIT_SHA"
    [ -n "$commit" ] || commit=HEAD

    # Git 変更ファイル取得（shallow clone 対策）
    if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
      if [ "$commit" != "HEAD" ]; then
        git fetch --no-tags --depth=2 origin "$commit" >/dev/null 2>&1 || true
      fi
      if git cat-file -e "$commit^{commit}" >/dev/null 2>&1; then
        parent="$(git rev-list --parents -n 1 "$commit" | awk '{print $2}')"
        if [ -n "$parent" ] && git cat-file -e "$parent^{commit}" >/dev/null 2>&1; then
          git diff --name-only "$parent" "$commit" > changed.txt
        else
          git ls-files > changed.txt
        fi
      else
        git ls-files > changed.txt
      fi
    else
      find . -type f | sed 's|^\./||' > changed.txt
    fi

    # whitelist
    [ -f deploy_frontend.txt ] || { echo "ERROR: deploy_frontend.txt not found"; exit 1; }
    tr -d '\r' < deploy_frontend.txt | grep -vE '^\s*($|#)' > deploy_frontend.normalized.txt

    echo "=== Deploy whitelist ==="
    cat deploy_frontend.normalized.txt
    echo "=== Uploading files ==="

    matches_whitelist () {
      file="$1"
      while IFS= read -r pattern
      do
        [ -n "$pattern" ] || continue
        case "$file" in $pattern) return 0 ;; esac
      done < deploy_frontend.normalized.txt
      return 1
    }

    while IFS= read -r file
    do
      [ -f "$file" ] || continue
      matches_whitelist "$file" || continue

      dir=$(dirname "$file")
      [ "$dir" != "." ] && mkdir -p "$dir"

      echo "Uploading: $file"

      # lftp の -e 内ではクォート不要
      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "set ftp:ssl-allow no; [ \"$dir\" != \".\" ] && mkdir -p $dir; put $file -o $file; bye"

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY