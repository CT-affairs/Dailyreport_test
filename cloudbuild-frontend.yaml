steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    git show --name-only --pretty="" HEAD > changed.txt
    cat changed.txt

    while IFS= read -r file
    do
      [ -f "$file" ] || continue

      # backend除外
      echo "$file" | grep -q '\.py$' && continue

      # git系除外
      echo "$file" | grep -q '^\.git' && continue

      # 隠しファイル除外
      echo "$file" | grep -q '^\.' && continue

      dir=$(dirname "$file")

      echo "upload: $file"

      FILE="$file"
      DIR="$dir"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no;
        mkdir -p \"$DIR\";
        put \"$FILE\" -o \"$FILE\";
        bye
      "

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY