steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    # Cloud Build では COMMIT_SHA が入る。入らない場合は HEAD を使用。
    commit="$COMMIT_SHA"
    [ -n "$commit" ] || commit=HEAD
    git diff-tree --no-commit-id --name-only -r "$commit" > changed.txt
    cat changed.txt

    echo ""
    echo "Deploy whitelist (deploy_frontend.txt):"
    if [ ! -f deploy_frontend.txt ]; then
      echo "ERROR: deploy_frontend.txt not found." >&2
      exit 1
    fi

    # 空行とコメント行を除外し、CRLFも吸収して正規化
    tr -d '\r' < deploy_frontend.txt | grep -vE '^\s*($|#)' > deploy_frontend.normalized.txt
    cat deploy_frontend.normalized.txt

    while IFS= read -r file
    do
      [ -f "$file" ] || continue

      # deploy_frontend.txt に含まれるものだけデプロイ対象
      grep -Fxq "$file" deploy_frontend.normalized.txt || continue

      dir=$(dirname "$file")

      echo "upload: $file"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no;
        mkdir -p $dir;
        put $file -o $file;
        bye
      "

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY