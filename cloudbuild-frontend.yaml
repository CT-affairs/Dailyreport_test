steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    git show --name-only --pretty="" HEAD > changed.txt
    cat changed.txt

    for file in $(cat changed.txt)
    do
      # 存在しないファイル除外
      [ -f "$file" ] || continue

      # backend除外
      echo "$file" | grep -q '\.py$' && continue
      echo "$file" | grep -q '^.git' && continue

      dir=$(dirname "$file")

      echo "upload: $file"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no
        mkdir -p /public_html/$dir
        put $file -o /public_html/$file
        bye
      "
    done

options:
  logging: CLOUD_LOGGING_ONLY