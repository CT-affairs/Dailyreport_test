steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    set -e

    apk add --no-cache git lftp

    echo "Changed files:"
    git show --name-only --pretty="" HEAD > changed.txt
    cat changed.txt

    echo ""
    echo "Deploy whitelist (deploy_frontend.txt):"
    if [ ! -f deploy_frontend.txt ]; then
      echo "ERROR: deploy_frontend.txt not found." >&2
      exit 1
    fi
    cat deploy_frontend.txt

    while IFS= read -r file
    do
      [ -f "$file" ] || continue

      # deploy_frontend.txt に含まれるものだけデプロイ対象
      grep -Fxq "$file" deploy_frontend.txt || continue

      dir=$(dirname "$file")

      echo "upload: $file"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no;
        mkdir -p $dir;
        put $file -o $file;
        bye
      "

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY