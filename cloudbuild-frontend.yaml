steps:
- name: alpine
  entrypoint: sh
  args:
  - -c
  - |
    apk add --no-cache git lftp

    echo "Changed files:"
    git diff --name-only HEAD~1 HEAD > changed.txt
    cat changed.txt

    while read file
    do

      if echo "$file" | grep -q '\.py$'; then
        echo "skip backend file: $file"
        continue
      fi

      if echo "$file" | grep -q '^.git'; then
        continue
      fi

      dir=$(dirname "$file")

      echo "upload: $file"

      lftp -u $_FTP_USER,$_FTP_PASS $_FTP_HOST -e "
        set ftp:ssl-allow no
        mkdir -p /public_html/$dir
        put $file -o /public_html/$file
        bye
      "

    done < changed.txt

options:
  logging: CLOUD_LOGGING_ONLY