<!--
FullCalendarのカスタムビュー用のテンプレートです。
`dayGrid`の基本的なテーブル構造をここに定義します。
FullCalendarは、このテンプレート内の {body.html} や {head.html} を
日付データで置き換えてカレンダーを完成させます。
-->
<div class="fc-daygrid-view fc-view">
  <table class="fc-scrollgrid">
    <thead>
      {head.html}
    </thead>
    <tbody>
      {body.html}
    </tbody>
  </table>
</div>
